<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro - RH Profissional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header class="form-header">
        <h2>Ficha de Cadastro de Funcionário</h2>
        <p class="subtitle no-print">Preencha os dados e clique em salvar para registrar na planilha.</p>
    </header>

    <form id="formFuncionario">
        <div class="form-group">
            <div class="input-box full-width">
                <label>Nome Completo *</label>
                <input type="text" id="nome" name="nome" required placeholder="Digite o nome completo">
            </div>

            <div class="input-box">
                <label>CPF *</label>
                <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00" maxlength="14">
            </div>
            <div class="input-box">
                <label>Data de Nascimento *</label>
                <input type="date" id="nascimento" name="nascimento" required>
            </div>

            <div class="input-box">
                <label>RG</label>
                <input type="text" id="rg" name="rg" placeholder="00.000.000-0">
            </div>
            <div class="input-box">
                <label>Estado Civil</label>
                <select id="estado_civil" name="estado_civil">
                    <option value="Solteiro">Solteiro(a)</option>
                    <option value="Casado">Casado(a)</option>
                    <option value="Divorciado">Divorciado(a)</option>
                    <option value="Viuvo">Viúvo(a)</option>
                </select>
            </div>

            <div class="input-box">
                <label>Quantidade de Filhos</label>
                <input type="number" id="filhos" name="filhos" min="0" value="0">
            </div>
            <div class="input-box">
                <label>Telefone</label>
                <input type="text" id="telefone" name="telefone" placeholder="(00) 00000-0000" maxlength="15">
            </div>

            <div class="input-box">
                <label>E-mail</label>
                <input type="email" id="email" name="email" placeholder="email@empresa.com">
            </div>
            <div class="input-box">
                <label>Cargo</label>
                <select id="cargo" name="cargo">
                    <option value="Pedreiro">Pedreiro</option>
                    <option value="Servente">Servente</option>
                    <option value="Mestre de Obras">Mestre de Obras</option>
                    <option value="Ajudante">Ajudante</option>
                    <option value="Eletricista">Eletricista</option>
                    <option value="Marceneiro">Marceneiro</option>
                    <option value="Secretário(a)">Secretário(a)</option>
                    <option value="Diretor(a)">Diretor(a)</option>
                    <option value="Agente Administrativo">Agente Administrativo</option>
                    <option value="Auxiliar de Serviços Gerais">Auxiliar de Serviços Gerais</option>
                </select>
            </div>

            <div class="input-box">
                <label>Salário Base (R$)</label>
                <input type="text" id="salario" name="salario" placeholder="R$ 0,00">
            </div>
            <div class="input-box">
                <label>Endereço Completo</label>
                <input type="text" id="endereco" name="endereco" placeholder="Rua, nº, Bairro, Cidade-UF">
            </div>
        </div>

        <div class="actions no-print">
            <button type="submit" class="btn-save">Salvar</button>
            <button type="button" class="btn-print" onclick="window.print()">Imprimir</button>
            <button type="reset" class="btn-clear">Limpar</button>
            <button type="button" class="btn-exit" onclick="sair()">Sair</button>
        </div>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
