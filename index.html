<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Funcionário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container no-print">
    <h2>Ficha de Cadastro de Funcionário</h2>
    <form id="formFuncionario">
        <div class="form-group">
            <div class="input-box full-width">
                <label>Nome Completo *</label>
                <input type="text" id="nome" required placeholder="Digite o nome completo">
            </div>

            <div class="input-box">
                <label>CPF *</label>
                <input type="text" id="cpf" required placeholder="000.000.000-00" maxlength="14">
            </div>

            <div class="input-box">
                <label>Data de Nascimento *</label>
                <input type="date" id="nascimento" required>
            </div>

            <div class="input-box">
                <label>RG</label>
                <input type="text" id="rg" placeholder="00.000.000-0">
            </div>

            <div class="input-box">
                <label>Estado Civil</label>
                <select id="estado_civil">
                    <option value="Solteiro">Solteiro(a)</option>
                    <option value="Casado">Casado(a)</option>
                    <option value="Divorciado">Divorciado(a)</option>
                    <option value="Viuvo">Viúvo(a)</option>
                </select>
            </div>

            <div class="input-box">
                <label>Telefone</label>
                <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15">
            </div>

            <div class="input-box">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="email@empresa.com">
            </div>

            <div class="input-box">
                <label>Cargo</label>
                <select id="cargo">
                    <option value="Pedreiro">Pedreiro</option>
                    <option value="Servente">Servente</option>
                    <option value="Mestre de Obras">Mestre de Obras</option>
                    <option value="Ajudante">Ajudante</option>
                    <option value="Eletricista">Eletricista</option>
                    <option value="Marceneiro">Marceneiro</option>
                    <option value="Secretário(a)">Secretário(a)</option>
                    <option value="Diretor(a)">Diretor(a)</option>
                    <option value="Agente Administrativo">Agente Administrativo</option>
                    <option value="Auxiliar de Serviços Gerais">Auxiliar de Serviços Gerais</option>
                </select>
            </div>

            <div class="input-box">
                <label>Salário (R$)</label>
                <input type="number" id="salario" step="0.01">
            </div>

            <div class="input-box full-width">
                <label>Endereço</label>
                <input type="text" id="endereco">
            </div>
        </div>

        <div class="actions">
            <button type="submit" class="btn-save">Salvar Cadastro</button>
            <button type="button" class="btn-print" onclick="window.print()">Imprimir Ficha</button>
        </div>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
